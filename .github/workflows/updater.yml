name: Actualizar Feed Farmacogenética

on:
  schedule:
    - cron: '0 8 * * 1' # Todos los lunes a las 8:00 UTC
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de extracción
        run: python update_feed.py

      - name: Commit y Push de los cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed_data.json
          git commit -m "Actualización automática del feed" || echo "No hay cambios para commitear"
          git push
